name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ /var/www/museoferro.com/

      - name: Fix permissions
        run: |
          sudo chown -R github-runner:www-data /var/www/museoferro.com/

      - name: Health check
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' https://museoferro.com)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Site is live (HTTP $STATUS)"

      - name: Notify success
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          sudo /usr/local/bin/notify-deploy "museoferro" "success" "Deployed: $COMMIT_MSG" || true

      - name: Notify failure
        if: failure()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          sudo /usr/local/bin/notify-deploy "museoferro" "failure" "Deploy failed: $COMMIT_MSG" || true
